<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otajon Rajabov - Link Hub</title>
    <!-- Tailwind CSS (Dizayn uchun) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome (Ikonkalar uchun) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Premium shrift "Outfit" -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent-color: #6366f1; /* Indigo-500 */
        }

        body {
            background-color: #0c0e14; 
            background-image: 
                radial-gradient(circle at 50% 0, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
            background-attachment: fixed;
            color: #f8fafc;
            overflow-x: hidden;
        }

        /* Glassmorphism - Premium & Distinct */
        .glass-btn {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.3);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
        }

        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-4px) scale(1.01);
            border-color: rgba(255, 255, 255, 0.35);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.45);
        }

        /* Profile Image Minimalist Glowing Ring - New */
        .profile-container {
            position: relative;
            padding: 2px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), transparent);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-img {
            border: 4px solid #0c0e14;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%;
            height: 100%;
        }

        .profile-img:hover { transform: scale(1.1); }

        /* Enhanced Entrance Animation - Sequential Scale-in */
        @keyframes reveal {
            from { opacity: 0; transform: translateY(20px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .reveal {
            opacity: 0;
            animation: reveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .social-icon {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #64748b;
        }
        
        .social-icon:hover {
            transform: scale(1.2) translateY(-4px);
            color: #ffffff;
            filter: drop-shadow(0 0 10px rgba(99, 102, 241, 0.6));
        }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen py-14 px-5 font-sans relative overflow-x-hidden text-slate-200">

    <script>
        // Havolalar: Ortiqcha izohlarsiz, toza nomlar bilan va yangilangan URL'lar. 
        // Hover qilinganda qaysi rangda jilolanishini "hoverGlow" orqali sozlashingiz mumkin.
        const LINKS_DATA = [
            {
                title: "YouTube",
                url: "https://www.youtube.com/@otajonai",
                icon: "fab fa-youtube",
                hoverGlow: "rgba(239, 68, 68, 0.5)", /* YouTube qizil jilo */
                iconColor: "text-red-500"
            },
            {
                title: "Instagram",
                url: "https://instagram.com/otajon.blog",
                icon: "fab fa-instagram",
                hoverGlow: "rgba(236, 72, 153, 0.5)", /* Instagram pushti jilo */
                iconColor: "text-pink-500"
            },
            {
                title: "Telegram",
                url: "https://t.me/Otajon_ai",
                icon: "fab fa-telegram",
                hoverGlow: "rgba(56, 189, 248, 0.5)", /* Telegram havorang jilo */
                iconColor: "text-sky-400"
            },
            {
                title: "GitHub",
                url: "#", // O'zingiz kiritasiz
                icon: "fab fa-github",
                hoverGlow: "rgba(255, 255, 255, 0.4)", /* GitHub oq jilo */
                iconColor: "text-gray-200"
            },
            {
                title: "Portfolio",
                url: "#", // O'zingiz kiritasiz
                icon: "fas fa-briefcase",
                hoverGlow: "rgba(168, 85, 247, 0.5)", /* Portfolio siyohrang jilo */
                iconColor: "text-purple-400"
            }
        ];
    </script>

    <!-- Header qismi (Profil) -->
    <header class="flex flex-col items-center mb-12 z-10 w-full max-w-sm sm:max-w-xl mt-4 text-center reveal" style="animation-delay: 0.1s;">
        <!-- Minimal Profil tasviri bilan aylanuvchi nur -->
        <div class="relative mb-6 group cursor-pointer profile-container w-28 h-28">
            <img src="./profile.jpg" alt="Otajon Rajabov" class="w-full h-full rounded-full object-cover profile-img">
        </div>
        
        <h1 class="text-4xl font-extrabold text-white mb-2 tracking-tight">Otajon Rajabov</h1>
        <p class="text-indigo-400 font-bold text-sm tracking-[0.4em] uppercase">Digital Expert</p>
    </header>

    <!-- Havolalar qismi -->
    <main id="links-container" class="w-full max-w-sm sm:max-w-xl flex flex-col gap-5 mb-20 z-10">
        <!-- Javascript orqali to'ldiriladi -->
    </main>

    <!-- Social Icons -->
    <footer class="flex gap-8 mt-auto z-10 mb-6">
        <a href="https://instagram.com/otajon.blog" target="_blank" class="social-icon text-3xl" aria-label="Instagram">
            <i class="fab fa-instagram"></i>
        </a>
        <a href="https://t.me/Otajon_ai" target="_blank" class="social-icon text-3xl" aria-label="Telegram">
            <i class="fab fa-telegram"></i>
        </a>
        <a href="https://www.youtube.com/@otajonai" target="_blank" class="social-icon text-3xl" aria-label="YouTube">
            <i class="fab fa-youtube"></i>
        </a>
    </footer>

    <!-- Buttonlarni chiqarish logikasi -->
    <script>
        const linksContainer = document.getElementById('links-container');
        
        LINKS_DATA.forEach((link, index) => {
            const a = document.createElement('a');
            a.href = link.url;
            a.target = "_blank";
            a.rel = "noopener noreferrer";
            
            // Animation Delay: Header starts at 0.1, so links start at 0.25+
            const revealDelay = 0.25 + (index * 0.08); 
            
            a.className = "glass-btn w-full px-6 py-4 sm:py-5 rounded-2xl flex items-center cursor-pointer group reveal";
            a.style.animationDelay = `${revealDelay}s`;
            
            a.innerHTML = `
                <style>
                    /* Neon glow on hover logic */
                    .glass-btn:nth-child(${index + 1}):hover {
                        box-shadow: 0 15px 35px -5px ${link.hoverGlow.replace('0.2', '0.25')}, 0 0 15px rgba(255, 255, 255, 0.03);
                        border-color: rgba(255, 255, 255, 0.4);
                    }
                </style>
                <div class="w-12 h-12 rounded-xl bg-white/5 flex items-center justify-center mr-5 group-hover:bg-white/10 transition-all duration-500 shadow-inner border border-white/10">
                    <i class="${link.icon} text-2xl ${link.iconColor} group-hover:scale-110 transition-transform duration-500"></i>
                </div>
                <span class="flex-1 font-semibold text-lg sm:text-xl text-slate-100 tracking-wide">${link.title}</span>
                <i class="fas fa-arrow-right text-indigo-400 opacity-0 group-hover:opacity-100 group-hover:translate-x-1 transition-all duration-500 text-sm"></i>
            `;
            
            linksContainer.appendChild(a);
        });
    </script>
</body>
</html>
