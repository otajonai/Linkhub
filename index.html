<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otajon Rajabov - Link Hub</title>
    <!-- Tailwind CSS (Dizayn uchun) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome (Ikonkalar uchun) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Premium shrift "Outfit" -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            /* Premium "Professional" qalin fon - To'q kosmik ranglar uyg'unligi (Mesh Gradient) */
            background-color: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            background-attachment: fixed;
            color: #f8fafc;
        }

        /* Glassmorphism (Shisha) kard effekti - Premium qatlam */
        .glass-btn {
            background: rgba(255, 255, 255, 0.03); /* Juda yengil shisha effekti */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08); /* Nozik chegara */
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Tugma ustiga borganda ko'tarilish va yonish */
        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-4px) scale(1.02);
            z-index: 10;
        }

        /* "Mayin oq light animatsiyalar" - Shimmer (Nur) effekti tugma ustidan muntazam o'tib turadi */
        .glass-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.15), transparent);
            transform: skewX(-25deg);
            /* Animatsiya uzluksiz, har bir tugma o'z ritmida (JS'da berilgan tsikl orqali) */
            animation: light-shimmer 4s infinite cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes light-shimmer {
            0% { left: -150%; }
            50% { left: 200%; } /* Nur o'tib ketadi */
            100% { left: 200%; } /* Takrorlanish uchun tabiyi pauza */
        }

        /* Profil rasmi uchun maxsus jilolanish */
        .profile-img {
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 5px;   
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
            transition: all 0.5s ease;
        }

        .profile-img:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* Footer'dagi ijtimoiy ikonkalarning silliq animatsiyasi */
        .social-icon {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: #94a3b8; /* slate-400 */
        }
        
        .social-icon:hover {
            transform: translateY(-5px) scale(1.15);
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen py-14 px-5 font-sans relative overflow-x-hidden text-slate-200">

    <script>
        // Havolalar: Ortiqcha izohlarsiz, toza nomlar bilan va yangilangan URL'lar. 
        // Hover qilinganda qaysi rangda jilolanishini "hoverGlow" orqali sozlashingiz mumkin.
        const LINKS_DATA = [
            {
                title: "YouTube",
                url: "https://www.youtube.com/@otajonai",
                icon: "fab fa-youtube",
                hoverGlow: "rgba(239, 68, 68, 0.5)", /* YouTube qizil jilo */
                iconColor: "text-red-500"
            },
            {
                title: "Instagram",
                url: "https://instagram.com/otajon.blog",
                icon: "fab fa-instagram",
                hoverGlow: "rgba(236, 72, 153, 0.5)", /* Instagram pushti jilo */
                iconColor: "text-pink-500"
            },
            {
                title: "Telegram",
                url: "https://t.me/Otajon_ai",
                icon: "fab fa-telegram",
                hoverGlow: "rgba(56, 189, 248, 0.5)", /* Telegram havorang jilo */
                iconColor: "text-sky-400"
            },
            {
                title: "GitHub",
                url: "#", // O'zingiz kiritasiz
                icon: "fab fa-github",
                hoverGlow: "rgba(255, 255, 255, 0.4)", /* GitHub oq jilo */
                iconColor: "text-gray-200"
            },
            {
                title: "Portfolio",
                url: "#", // O'zingiz kiritasiz
                icon: "fas fa-briefcase",
                hoverGlow: "rgba(168, 85, 247, 0.5)", /* Portfolio siyohrang jilo */
                iconColor: "text-purple-400"
            }
        ];
    </script>

    <!-- Header qismi (Profil) -->
    <header class="flex flex-col items-center mb-12 z-10 w-full max-w-sm mt-4 text-center">
        <!-- Chiroyli va Premium Profil tasviri (Placeholder yangilandi) -->
        <div class="relative mb-5 group cursor-pointer">
            <img src="./profile.jpg" alt="Otajon Rajabov" class="w-28 h-28 rounded-full object-cover profile-img z-10 relative">
            <!-- Profil orqasidagi glow effekti -->
            <div class="absolute inset-0 bg-white opacity-0 rounded-full blur-xl group-hover:opacity-20 transition-opacity duration-500"></div>
        </div>
        
        <h1 class="text-3xl font-bold text-white mb-2 tracking-tight">Otajon Rajabov</h1>
        <p class="text-slate-400 font-semibold text-xs tracking-[0.2em] uppercase">Digital Expert</p>
    </header>

    <!-- Havolalar qismi -->
    <main id="links-container" class="w-full max-w-sm flex flex-col gap-4 mb-20 z-10">
        <!-- Javascript orqali to'ldiriladi -->
    </main>

    <!-- Social Icons -->
    <footer class="flex gap-8 mt-auto z-10 mb-6">
        <a href="https://instagram.com/otajon.blog" target="_blank" class="social-icon text-3xl" aria-label="Instagram">
            <i class="fab fa-instagram"></i>
        </a>
        <a href="https://t.me/Otajon_ai" target="_blank" class="social-icon text-3xl" aria-label="Telegram">
            <i class="fab fa-telegram"></i>
        </a>
        <a href="https://www.youtube.com/@otajonai" target="_blank" class="social-icon text-3xl" aria-label="YouTube">
            <i class="fab fa-youtube"></i>
        </a>
    </footer>

    <!-- Buttonlarni chiqarish logikasi -->
    <script>
        const linksContainer = document.getElementById('links-container');
        
        LINKS_DATA.forEach((link, index) => {
            const a = document.createElement('a');
            a.href = link.url;
            a.target = "_blank";
            a.rel = "noopener noreferrer";
            
            // "delay-X" uchun: Har bir tugmadagi nur bir-biridan biroz farqli vaqtda o'tadi
            const animationDelay = (index * 0.4) + "s";
            
            a.className = "glass-btn w-full px-4 py-3 sm:py-4 sm:px-5 rounded-2xl flex items-center cursor-pointer group";
            
            // Inline CSS orqali kutish vaqtini va hover neon effekti dinamik biriktiramiz
            a.innerHTML = `
                <style>
                    .glass-btn:nth-child(${index + 1})::after {
                        animation-delay: ${animationDelay};
                    }
                    /* Ustiga borganda platformasiga qarab rangli glow berishi */
                    .glass-btn:nth-child(${index + 1}):hover {
                        box-shadow: 0 10px 25px -5px ${link.hoverGlow}, 0 0 15px rgba(255, 255, 255, 0.05);
                        border-color: rgba(255, 255, 255, 0.3);
                    }
                </style>
                <!-- Ikonka qismi alohida chiroyli to'rtburchak blok ichida -->
                <div class="w-12 h-12 rounded-xl bg-white/5 flex items-center justify-center mr-4 group-hover:bg-white/10 transition-colors duration-300 shadow-inner border border-white/5">
                    <i class="${link.icon} text-2xl ${link.iconColor} group-hover:scale-110 transition-transform duration-300"></i>
                </div>
                <!-- Matn qismi faqat ismlar bilan -->
                <span class="flex-1 font-semibold text-lg text-slate-100 tracking-wide">${link.title}</span>
                <!-- O'ng tarafdagi yo'naltiruvchi kichik strelka (faqat ustiga borganda chiqadi) -->
                <i class="fas fa-chevron-right text-slate-500 opacity-0 group-hover:opacity-100 group-hover:translate-x-1 transition-all duration-300 transform text-sm"></i>
            `;
            
            linksContainer.appendChild(a);
        });
    </script>
</body>
</html>
